<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Tracker POS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #f5a623;
      --accent2: #e8440a;
      --text: #f0ede6;
      --muted: #888;
      --success: #4caf82;
      --danger: #e84444;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #clock {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── LAYOUT ── */
    .app {
      display: grid;
      grid-template-columns: 1fr 360px;
      height: calc(100vh - 60px);
    }

    /* ── LEFT: ORDER PANEL ── */
    .order-panel {
      overflow-y: auto;
      padding: 24px;
      border-right: 1px solid var(--border);
    }

    .panel-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* cashier / customer row */
    .meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ── CATEGORY SECTION ── */
    .category-block {
      margin-bottom: 28px;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .cat-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .cat-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── ITEM GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .item-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .item-card.has-value {
      border-color: var(--accent);
      background: #1e1a10;
    }

    .item-name {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
      text-transform: capitalize;
    }

    /* ── PRICE BUTTONS ── */
    .price-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .price-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .price-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .price-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 700;
    }

    /* ── CUSTOM AMOUNT INPUT ── */
    .custom-input-wrap {
      display: none;
      margin-top: 6px;
    }

    .custom-input-wrap.show {
      display: block;
    }

    .custom-input-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    .custom-input-wrap input:focus {
      outline: none;
    }

    /* amount badge on card */
    .amount-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      border-radius: 6px;
      padding: 2px 8px;
      display: none;
    }

    .item-card.has-value .amount-badge {
      display: block;
    }

    /* ── RIGHT: SUMMARY PANEL ── */
    .summary-panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    .summary-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    .summary-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
    }

    .summary-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── ORDER LIST ── */
    .order-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }

    .order-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .order-item-name {
      font-size: 14px;
      font-weight: 500;
      text-transform: capitalize;
    }

    .order-item-amount {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
    }

    /* ── TOTALS ── */
    .totals-block {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .total-label {
      font-size: 13px;
      color: var(--muted);
    }

    .total-value {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
    }

    .grand-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .grand-total-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
    }

    .grand-total-value {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: var(--accent);
    }

    /* ── SUBMIT AREA ── */
    .submit-area {
      padding: 16px 20px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.05em;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      background: #ffb83f;
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }

    .btn-clear {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── STATUS TOAST ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 40px;
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.error {
      background: var(--danger);
      color: #fff;
    }

    /* ── LOADING OVERLAY ── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,15,0.85);
      z-index: 998;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #loading.show {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: var(--muted);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr auto;
        height: auto;
      }
      .summary-panel {
        height: auto;
        max-height: 60vh;
      }
      .order-panel {
        height: auto;
        overflow-y: visible;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Sales<span>Tracker</span></div>
  <div class="header-meta">
    <span id="clock"></span>
  </div>
</header>

<div class="app">

  <!-- ── LEFT PANEL ── -->
  <div class="order-panel">

    <div class="panel-title">New Transaction</div>

    <div class="meta-row">
      <div class="field">
        <label>Cashier Name</label>
        <input type="text" id="cashier" placeholder="e.g. Maria" autocomplete="off" />
      </div>
      <div class="field">
        <label>Customer Name <span style="color:var(--muted);font-size:10px;">(optional)</span></label>
        <input type="text" id="customer" placeholder="e.g. Juan" autocomplete="off" />
      </div>
    </div>

    <!-- FOOD ITEMS -->
    <div class="category-block">
      <div class="cat-header">
        <span class="cat-label">Food</span>
        <div class="cat-line"></div>
      </div>
      <div class="items-grid" id="food-grid"></div>
    </div>

    <!-- DRINKS -->
    <div class="category-block">
      <div class="cat-header">
        <span class="cat-label">Drinks</span>
        <div class="cat-line"></div>
      </div>
      <div class="items-grid" id="drinks-grid"></div>
    </div>

  </div>

  <!-- ── RIGHT PANEL (SUMMARY) ── -->
  <div class="summary-panel">

    <div class="summary-header">
      <div class="summary-title">Order Summary</div>
      <div class="summary-subtitle" id="summary-date"></div>
    </div>

    <div class="order-list" id="order-list">
      <div class="order-empty">No items added yet.<br>Select items on the left.</div>
    </div>

    <div class="totals-block">
      <div class="total-row">
        <span class="total-label">Items</span>
        <span class="total-value" id="item-count">0</span>
      </div>
      <div class="grand-total-row">
        <span class="grand-total-label">TOTAL</span>
        <span class="grand-total-value" id="grand-total">₱0</span>
      </div>
    </div>

    <div class="submit-area">
      <button class="btn-submit" id="btn-submit" onclick="submitOrder()" disabled>
        Submit Order
      </button>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>

  </div>
</div>

<!-- Toast & Loading -->
<div id="toast"></div>
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Saving to Google Sheets…</div>
</div>

<script>
  // ── CONFIG ── Replace with your Google Apps Script Web App URL
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwfyzwkVtpuljM2lE6oWoAxeXJnIl3E40ramyfKC_kOLgnn_qGf2d2IEPyqUH0QQ47VDw/exec";

  const FOOD_ITEMS = [
    "cheese sticks", "chicken ball", "fish ball", "fries",
    "kikiam", "paa", "quail egg", "tokwa", "squid ball"
  ];

  const DRINK_ITEMS = [
    "mais con yelo", "choco kisses", "double dutch",
    "melon", "ube", "buko pandan", "mango"
  ];

  const DEFAULT_PRICES = [5, 10, 15, 20];

  // State: { itemKey: amount }
  const orderState = {};

  // ── CLOCK ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-PH', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── DATE IN SUMMARY ──
  document.getElementById('summary-date').textContent =
    new Date().toLocaleDateString('en-PH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // ── BUILD ITEM CARDS ──
  function buildItemCard(itemName) {
    const key = itemName.replace(/\s+/g, '_');

    const card = document.createElement('div');
    card.className = 'item-card';
    card.id = `card-${key}`;

    const badge = document.createElement('div');
    badge.className = 'amount-badge';
    badge.id = `badge-${key}`;
    badge.textContent = '₱0';

    const name = document.createElement('div');
    name.className = 'item-name';
    name.textContent = itemName;

    const btnRow = document.createElement('div');
    btnRow.className = 'price-btns';

    DEFAULT_PRICES.forEach(price => {
      const btn = document.createElement('button');
      btn.className = 'price-btn';
      btn.textContent = `₱${price}`;
      btn.dataset.price = price;
      btn.dataset.key = key;
      btn.onclick = () => selectPrice(key, price, btn);
      btnRow.appendChild(btn);
    });

    // Custom button
    const customBtn = document.createElement('button');
    customBtn.className = 'price-btn';
    customBtn.textContent = 'Custom';
    customBtn.dataset.key = key;
    customBtn.onclick = () => toggleCustom(key, customBtn);
    btnRow.appendChild(customBtn);

    // Custom input wrap
    const customWrap = document.createElement('div');
    customWrap.className = 'custom-input-wrap';
    customWrap.id = `custom-wrap-${key}`;

    const customInput = document.createElement('input');
    customInput.type = 'number';
    customInput.min = '1';
    customInput.placeholder = 'Enter amount (₱)';
    customInput.id = `custom-${key}`;
    customInput.oninput = () => {
      const val = parseFloat(customInput.value);
      if (!isNaN(val) && val > 0) {
        setItemAmount(key, val);
        // mark custom btn active
        card.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
        customBtn.classList.add('active');
      } else {
        setItemAmount(key, 0);
      }
    };

    customWrap.appendChild(customInput);

    card.appendChild(badge);
    card.appendChild(name);
    card.appendChild(btnRow);
    card.appendChild(customWrap);

    return card;
  }

  // ── SELECT PRESET PRICE ──
  function selectPrice(key, price, clickedBtn) {
    // Clear all active states for this card
    const card = document.getElementById(`card-${key}`);
    card.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
    clickedBtn.classList.add('active');

    // Hide custom input
    document.getElementById(`custom-wrap-${key}`).classList.remove('show');
    const customInput = document.getElementById(`custom-${key}`);
    if (customInput) customInput.value = '';

    // If clicking the same price again → deselect (toggle off)
    if (orderState[key] === price) {
      clickedBtn.classList.remove('active');
      setItemAmount(key, 0);
      return;
    }

    setItemAmount(key, price);
  }

  // ── TOGGLE CUSTOM INPUT ──
  function toggleCustom(key, customBtn) {
    const wrap = document.getElementById(`custom-wrap-${key}`);
    const card = document.getElementById(`card-${key}`);
    const isShowing = wrap.classList.contains('show');

    if (isShowing) {
      wrap.classList.remove('show');
      card.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
      setItemAmount(key, 0);
    } else {
      card.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
      customBtn.classList.add('active');
      wrap.classList.add('show');
      document.getElementById(`custom-${key}`).focus();
    }
  }

  // ── SET ITEM AMOUNT (core state) ──
  function setItemAmount(key, amount) {
    if (amount <= 0) {
      delete orderState[key];
    } else {
      orderState[key] = amount;
    }

    const card = document.getElementById(`card-${key}`);
    const badge = document.getElementById(`badge-${key}`);

    if (amount > 0) {
      card.classList.add('has-value');
      badge.textContent = `₱${amount}`;
    } else {
      card.classList.remove('has-value');
      badge.textContent = '';
      // Deactivate all buttons
      card.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
    }

    updateSummary();
  }

  // ── UPDATE RIGHT SUMMARY ──
  function updateSummary() {
    const list = document.getElementById('order-list');
    const total = Object.values(orderState).reduce((a, b) => a + b, 0);
    const count = Object.keys(orderState).length;

    document.getElementById('grand-total').textContent = `₱${total}`;
    document.getElementById('item-count').textContent = count;
    document.getElementById('btn-submit').disabled = total === 0;

    if (count === 0) {
      list.innerHTML = '<div class="order-empty">No items added yet.<br>Select items on the left.</div>';
      return;
    }

    list.innerHTML = '';
    const allItems = [...FOOD_ITEMS, ...DRINK_ITEMS];
    allItems.forEach(itemName => {
      const key = itemName.replace(/\s+/g, '_');
      if (orderState[key]) {
        const row = document.createElement('div');
        row.className = 'order-item';
        row.innerHTML = `
          <span class="order-item-name">${itemName}</span>
          <span class="order-item-amount">₱${orderState[key]}</span>
        `;
        list.appendChild(row);
      }
    });
  }

  // ── SUBMIT ORDER ──
  async function submitOrder() {
    const cashier = document.getElementById('cashier').value.trim();
    const customer = document.getElementById('customer').value.trim();

    if (!cashier) {
      showToast('Please enter the cashier name.', true);
      document.getElementById('cashier').focus();
      return;
    }

    if (Object.keys(orderState).length === 0) {
      showToast('Please add at least one item.', true);
      return;
    }

    // Build row data in column order
    const allItems = [...FOOD_ITEMS, ...DRINK_ITEMS];
    const itemAmounts = allItems.map(name => {
      const key = name.replace(/\s+/g, '_');
      return orderState[key] || 0;
    });

    const total = itemAmounts.reduce((a, b) => a + b, 0);

    const payload = {
      timestamp: new Date().toLocaleString('en-PH', { timeZone: 'Asia/Manila' }),
      cashier: cashier,
      customer: customer || '—',
      items: itemAmounts,
      total: total
    };

    showLoading(true);

    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      const text = await response.text();

      if (text.includes('SUCCESS')) {
        showLoading(false);
        showToast('✓ Order saved to Google Sheets!');
        clearAll();
      } else {
        throw new Error(text);
      }
    } catch (err) {
      showLoading(false);
      showToast('Error saving. Check your GAS URL.', true);
      console.error(err);
    }
  }

  // ── CLEAR ALL ──
  function clearAll() {
    Object.keys(orderState).forEach(k => delete orderState[k]);

    // Reset all cards
    document.querySelectorAll('.item-card').forEach(card => {
      card.classList.remove('has-value');
      card.querySelectorAll('.price-btn').forEach(b => b.classList.remove('active'));
      card.querySelectorAll('.custom-input-wrap').forEach(w => w.classList.remove('show'));
      card.querySelectorAll('input[type=number]').forEach(i => i.value = '');
    });

    updateSummary();
  }

  // ── TOAST ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('error', isError);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── LOADING ──
  function showLoading(state) {
    document.getElementById('loading').classList.toggle('show', state);
  }

  // ── INIT: BUILD GRIDS ──
  const foodGrid = document.getElementById('food-grid');
  FOOD_ITEMS.forEach(item => foodGrid.appendChild(buildItemCard(item)));

  const drinksGrid = document.getElementById('drinks-grid');
  DRINK_ITEMS.forEach(item => drinksGrid.appendChild(buildItemCard(item)));

  updateSummary();
</script>
</body>
</html>
